<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftTrans • Create Shipment</title>

<link rel="stylesheet" href="admin.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter', system-ui, sans-serif;
}

body{
background:#0A0A0F;
color:#E5E7EB;
min-height:100vh;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
background:#1F2937;
padding:50px;
border-radius:24px;
box-shadow:0 20px 60px rgba(0,0,0,0.5);
border:1px solid #374151;
}

h2{
margin-bottom:40px;
color:#F3F4F6;
text-align:center;
font-size:32px;
font-weight:700;
}

.form-group{
margin-bottom:24px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#9CA3AF;
font-size:15px;
}

input,
select,
textarea{
width:100%;
padding:16px 20px;
background:#111827;
border:1px solid #374151;
border-radius:14px;
font-size:16px;
color:#fff;
outline:none;
transition:0.3s;
}

input:focus,
select:focus,
textarea:focus{
border-color:#8A2BE2;
box-shadow:0 0 0 3px rgba(138,43,226,0.2);
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:24px;
}

.back{
display:inline-flex;
align-items:center;
gap:8px;
margin-bottom:30px;
color:#9CA3AF;
text-decoration:none;
font-weight:500;
}

.back:hover{
color:#00D9FF;
}

button{
width:100%;
padding:18px;
background:linear-gradient(135deg,#8A2BE2,#6A1B9A);
color:white;
border:none;
border-radius:16px;
font-size:17px;
font-weight:600;
cursor:pointer;
margin-top:20px;
transition:all 0.4s ease;
}

button:hover{
transform:translateY(-3px);
box-shadow:0 15px 30px rgba(138,43,226,0.4);
}

@media(max-width:768px){
.row{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<a href="dashboard.html" class="back">← Back to Dashboard</a>

<h2>Create New Shipment</h2>

<form id="shipmentForm">

<div class="row">

<div class="form-group">
<label>Tracking ID (Auto-generated)</label>
<input type="text" id="trackingId" readonly>
</div>

<div class="form-group">
<label>Status</label>
<select id="status">
<option value="Pending">Pending</option>
<option value="In Transit">In Transit</option>
<option value="Delivered">Delivered</option>
</select>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Name</label>
<input type="text" id="senderName" required>
</div>

<div class="form-group">
<label>Sender Email</label>
<input type="email" id="senderEmail">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Phone</label>
<input type="text" id="senderPhone">
</div>

<div class="form-group">
<label>Receiver Name</label>
<input type="text" id="receiverName" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Receiver Email</label>
<input type="email" id="receiverEmail">
</div>

<div class="form-group">
<label>Receiver Phone</label>
<input type="text" id="receiverPhone">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Origin</label>
<input type="text" id="origin">
</div>

<div class="form-group">
<label>Destination</label>
<input type="text" id="destination">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Weight (kg)</label>
<input type="text" id="weight">
</div>

<div class="form-group">
<label>Carrier</label>
<input type="text" id="carrier">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Current Location</label>
<input type="text" id="currentLocation">
</div>

<div class="form-group">
<label>Expected Delivery</label>
<input type="date" id="expectedDelivery">
</div>

</div>

<div class="form-group">
<label>Description / Notes</label>
<textarea id="description" rows="4"></textarea>
</div>

<button type="submit">
Create & Save Shipment
</button>

</form>

</div>

<script type="module" src="create-shipment.js"></script>

</body>
  </html>
