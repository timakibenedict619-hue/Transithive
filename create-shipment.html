<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Shipment</title>

<link rel="stylesheet" href="admin.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
margin-bottom:20px;
color:#0d47a1;
text-align:center;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:6px;
font-weight:bold;
}

input,
select,
textarea{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
font-size:15px;
}

textarea{
height:100px;
resize:vertical;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

button{
width:100%;
padding:14px;
background:#0d47a1;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#08306b;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#0d47a1;
font-weight:bold;
}

@media(max-width:768px){
.row{
grid-template-columns:1fr;
}
}
</style>

</head>

<body>

<div class="container">

<a href="dashboard.html" class="back">← Back to Dashboard</a>

<h2>Create Shipment</h2>

<form id="shipmentForm">

<div class="row">

<div class="form-group">
<label>Tracking ID</label>
<input type="text" id="trackingId" readonly>
</div>

<div class="form-group">
<label>Status</label>
<select id="status">
<option value="Pending">Pending</option>
<option value="In Transit">In Transit</option>
<option value="Delivered">Delivered</option>
</select>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Name</label>
<input type="text" id="senderName" required>
</div>

<div class="form-group">
<label>Sender Email</label>
<input type="email" id="senderEmail">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Sender Phone</label>
<input type="text" id="senderPhone">
</div>

<div class="form-group">
<label>Receiver Name</label>
<input type="text" id="receiverName" required>
</div>

</div>

<div class="row">

<div class="form-group">
<label>Receiver Email</label>
<input type="email" id="receiverEmail">
</div>

<div class="form-group">
<label>Receiver Phone</label>
<input type="text" id="receiverPhone">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Origin</label>
<input type="text" id="origin">
</div>

<div class="form-group">
<label>Destination</label>
<input type="text" id="destination">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Weight</label>
<input type="text" id="weight">
</div>

<div class="form-group">
<label>Carrier</label>
<input type="text" id="carrier">
</div>

</div>

<div class="row">

<div class="form-group">
<label>Current Location</label>
<input type="text" id="currentLocation">
</div>

<div class="form-group">
<label>Expected Delivery</label>
<input type="date" id="expectedDelivery">
</div>

</div>

<div class="form-group">

<label>Description</label>

<textarea id="description"></textarea>

</div>

<button type="submit">
Create Shipment
</button>

</form>

</div>

<script type="module" src="shipment.js"></script>

</body>
</html>
