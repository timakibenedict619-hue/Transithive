<!doctype html><html><head><meta charset="utf-8"><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-8 bg-gray-100">
<form id="shipmentForm" class="max-w-xl mx-auto bg-white p-6 rounded shadow space-y-3">
<h1 class="text-2xl font-bold">Create Shipment</h1>
<input name="senderName" placeholder="Sender Name" class="border p-2 w-full">
<input name="receiverName" placeholder="Receiver Name" class="border p-2 w-full">
<input name="receiverEmail" placeholder="Receiver Email" class="border p-2 w-full">
<input name="origin" placeholder="Origin" class="border p-2 w-full">
<input name="destination" placeholder="Destination" class="border p-2 w-full">
<input name="currentLocation" placeholder="Current Location" class="border p-2 w-full">
<select name="status" class="border p-2 w-full"><option>Pending</option><option>In Transit</option><option>Delivered</option></select>
<button class="bg-blue-600 text-white px-4 py-2 rounded">Create Shipment</button>
</form>
<script type="module" src="admin.js"></script>
</body></html>
