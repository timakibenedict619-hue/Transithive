<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftTrans Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#6d28d9;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5b21b6;
}

#error{
    color:red;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="card">

<h2 style="text-align:center;">SwiftTrans Admin</h2>

<input
type="email"
id="email"
placeholder="Admin Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<p id="error"></p>

</div>

<script type="module" src="admin-login.js"></script>

</body>
</html>
