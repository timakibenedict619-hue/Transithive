<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Transithive | Admin Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
overflow:hidden;
}

.background{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.background span{
position:absolute;
display:block;
width:120px;
height:120px;
background:rgba(255,255,255,.05);
border-radius:50%;
animation:float 18s linear infinite;
}

.background span:nth-child(1){
left:10%;
top:20%;
animation-duration:18s;
}

.background span:nth-child(2){
left:70%;
top:15%;
animation-duration:22s;
width:180px;
height:180px;
}

.background span:nth-child(3){
left:80%;
top:70%;
animation-duration:16s;
}

.background span:nth-child(4){
left:20%;
top:80%;
animation-duration:25s;
width:150px;
height:150px;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
}

50%{
transform:translateY(-60px) rotate(180deg);
}

100%{
transform:translateY(0) rotate(360deg);
}

}

.card{

position:relative;

z-index:10;

width:420px;

background:white;

border-radius:20px;

padding:40px;

box-shadow:0 25px 60px rgba(0,0,0,.35);

}

.logo{

width:80px;

height:80px;

margin:auto;

background:#2563eb;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

font-size:40px;

color:white;

margin-bottom:20px;

}

h1{

text-align:center;

font-size:30px;

margin-bottom:5px;

color:#111827;

}

.subtitle{

text-align:center;

color:#6b7280;

margin-bottom:35px;

}

label{

display:block;

margin-bottom:8px;

font-weight:bold;

color:#374151;

}

input{

width:100%;

padding:15px;

border:1px solid #d1d5db;

border-radius:10px;

margin-bottom:20px;

font-size:16px;

transition:.3s;

}

input:focus{

outline:none;

border-color:#2563eb;

box-shadow:0 0 10px rgba(37,99,235,.25);

}

button{

width:100%;

padding:15px;

background:#2563eb;

color:white;

font-size:17px;

font-weight:bold;

border:none;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

transform:translateY(-2px);

}

#error{

margin-top:18px;

text-align:center;

color:red;

font-size:15px;

}

.footer{

margin-top:30px;

text-align:center;

font-size:13px;

color:#6b7280;

}

</style>

</head>

<body>

<div class="background">

<span></span>

<span></span>

<span></span>

<span></span>

</div>

<div class="card">

<div class="logo">

🚚

</div>

<h1>Chinyere</h1>

<p class="subtitle">

Administrator Portal

</p>

<label>Email Address</label>

<input
type="email"
id="email"
placeholder="Enter admin email">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Enter password">

<button id="loginBtn">

Login

</button>

<p id="error"></p>

<div class="footer">

© 2026 Transithive. All Rights Reserved.

</div>

</div>

<script type="module" src="admin-login.js"></script>

</body>
</html>
