<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="admin.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:250px;
background:#0d47a1;
height:100vh;
color:white;
position:fixed;
padding:20px;
}

.sidebar h2{
margin-bottom:30px;
text-align:center;
}

.sidebar ul{
list-style:none;
}

.sidebar li{
margin:18px 0;
}

.sidebar a{
color:white;
text-decoration:none;
font-size:16px;
}

.main{
margin-left:250px;
width:100%;
padding:25px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logout{
background:red;
color:white;
padding:10px 20px;
border:none;
cursor:pointer;
border-radius:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card h3{
color:#666;
margin-bottom:10px;
}

.card h1{
color:#0d47a1;
}

.actions{
display:flex;
gap:15px;
margin-bottom:30px;
}

.actions button{
padding:12px 20px;
border:none;
background:#0d47a1;
color:white;
cursor:pointer;
border-radius:6px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

th,td{
padding:15px;
border-bottom:1px solid #ddd;
text-align:left;
}

th{
background:#0d47a1;
color:white;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>Consignment</h2>

<ul>

<li><a href="dashboard.html">Dashboard</a></li>

<li><a href="create-shipment.html">Create Shipment</a></li>

<li><a href="manage-shipments.html">Manage Shipments</a></li>

<li><a href="tracking.html">Tracking</a></li>

<li><a href="#">Settings</a></li>

</ul>

</div>

<div class="main">

<div class="header">

<h1>Admin Dashboard</h1>

<button class="logout" id="logoutBtn">Logout</button>

</div>

<div class="cards">

<div class="card">
<h3>Total Shipments</h3>
<h1 id="totalShipments">0</h1>
</div>

<div class="card">
<h3>Pending</h3>
<h1 id="pendingShipments">0</h1>
</div>

<div class="card">
<h3>In Transit</h3>
<h1 id="transitShipments">0</h1>
</div>

<div class="card">
<h3>Delivered</h3>
<h1 id="deliveredShipments">0</h1>
</div>

</div>

<div class="actions">

<button onclick="location.href='create-shipment.html'">
Create Shipment
</button>

<button onclick="location.href='manage-shipments.html'">
Manage Shipments
</button>



</div>

<h2 style="margin-bottom:15px;">Recent Shipments</h2>

<table>

<thead>

<tr>

<th>Tracking ID</th>

<th>Receiver</th>

<th>Status</th>

<th>Destination</th>

</tr>

</thead>

<tbody id="shipmentTable">

<tr>

<td colspan="4" style="text-align:center;">
No shipments available
</td>

</tr>

</tbody>

</table>

</div>

<script type="module">

import { auth } from "./firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document.getElementById("logoutBtn").addEventListener("click", async ()=>{

await signOut(auth);

window.location.href="admin-login.html";

});

</script>

</body>
  </html>
