<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftTrans Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col">

        <div class="p-6 border-b border-slate-700">
            <h1 class="text-2xl font-bold">SwiftTrans</h1>
            <p class="text-sm text-gray-400">Admin Panel</p>
        </div>

        <nav class="flex-1 p-4 space-y-2">

            <button id="dashboardBtn" class="w-full text-left px-4 py-3 rounded bg-blue-600">
                <i class="fa-solid fa-chart-line mr-2"></i>
                Dashboard
            </button>

            <button id="shipmentsBtn" class="w-full text-left px-4 py-3 rounded hover:bg-slate-700">
                <i class="fa-solid fa-box mr-2"></i>
                Shipments
            </button>

            <button id="trackingBtn" class="w-full text-left px-4 py-3 rounded hover:bg-slate-700">
                <i class="fa-solid fa-location-dot mr-2"></i>
                Tracking
            </button>

            <button id="customersBtn" class="w-full text-left px-4 py-3 rounded hover:bg-slate-700">
                <i class="fa-solid fa-users mr-2"></i>
                Customers
            </button>

            <button id="settingsBtn" class="w-full text-left px-4 py-3 rounded hover:bg-slate-700">
                <i class="fa-solid fa-gear mr-2"></i>
                Settings
            </button>

        </nav>

        <div class="p-4 border-t border-slate-700">

            <p id="adminEmail" class="text-sm mb-3"></p>

            <button
                onclick="logout()"
                class="w-full bg-red-600 hover:bg-red-700 py-3 rounded">
                Logout
            </button>

        </div>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 overflow-auto">

        <h1 class="text-3xl font-bold mb-8">
            Dashboard
        </h1>

        <div class="grid md:grid-cols-4 gap-6">

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Total Shipments</h3>
                <h2 id="totalShipments" class="text-4xl font-bold mt-3">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Pending</h3>
                <h2 id="pendingShipments" class="text-4xl font-bold mt-3">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">In Transit</h3>
                <h2 id="transitShipments" class="text-4xl font-bold mt-3">0</h2>
            </div>

            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-gray-500">Delivered</h3>
                <h2 id="deliveredShipments" class="text-4xl font-bold mt-3">0</h2>
            </div>

        </div>

        <div
            id="content"
            class="bg-white rounded-xl shadow mt-8 p-8">

            <h2 class="text-2xl font-bold">
                Welcome to SwiftTrans Admin
            </h2>

            <p class="mt-3 text-gray-600">
                Use the sidebar to manage shipments, tracking updates, customers and settings.
            </p>

        </div>

    </main>

</div>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/dashboard.js"></script>

</body>
</html>
