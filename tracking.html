<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Track Shipment</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f6f9;
}

header{
background:#0d47a1;
color:#fff;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:40px auto;
padding:20px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:30px;
}

.search-box input{
flex:1;
padding:15px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

.search-box button{
padding:15px 25px;
background:#0d47a1;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

.card{
display:none;
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
margin-bottom:25px;
}

.card h2{
color:#0d47a1;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.item{
margin-bottom:15px;
}

.item label{
display:block;
font-size:14px;
color:#777;
margin-bottom:5px;
}

.item span{
font-weight:bold;
font-size:16px;
}

.progress{
margin:30px 0;
}

.progress-bar{
height:18px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.progress-fill{
height:100%;
width:0%;
background:#4CAF50;
transition:.4s;
}

.timeline{
list-style:none;
border-left:4px solid #0d47a1;
padding-left:20px;
margin-top:20px;
}

.timeline li{
margin-bottom:20px;
position:relative;
}

.timeline li::before{
content:"";
position:absolute;
left:-28px;
top:5px;
width:14px;
height:14px;
background:#0d47a1;
border-radius:50%;
}

.status{
display:inline-block;
padding:8px 18px;
background:#4CAF50;
color:#fff;
border-radius:20px;
}

.not-found{
display:none;
background:#ffebee;
color:#c62828;
padding:20px;
border-radius:8px;
text-align:center;
}

footer{
text-align:center;
padding:20px;
color:#666;
margin-top:50px;
}

</style>

</head>

<body>

<header>

<h1>Shipment Tracking</h1>

<p>Track your shipment in real time</p>

</header>

<div class="container">

<div class="search-box">

<input
type="text"
id="trackingInput"
placeholder="Enter Tracking Number">

<button id="trackBtn">

Track Shipment

</button>

</div>

<div class="not-found" id="notFound">

Shipment not found.

</div>

<div class="card" id="resultCard">

<h2>Shipment Information</h2>

<div class="grid">

<div class="item">
<label>Tracking ID</label>
<span id="trackingId"></span>
</div>

<div class="item">
<label>Status</label>
<span class="status" id="status"></span>
</div>

<div class="item">
<label>Origin</label>
<span id="origin"></span>
</div>

<div class="item">
<label>Destination</label>
<span id="destination"></span>
</div>

<div class="item">
<label>Current Location</label>
<span id="currentLocation"></span>
</div>

<div class="item">
<label>Expected Delivery</label>
<span id="expectedDelivery"></span>
</div>

<div class="item">
<label>Carrier</label>
<span id="carrier"></span>
</div>

<div class="item">
<label>Weight</label>
<span id="weight"></span>
</div>

</div>

<div class="progress">

<h3>Delivery Progress</h3>

<br>

<div class="progress-bar">

<div
class="progress-fill"
id="progressFill">
</div>

</div>

</div>

<h2>Tracking History</h2>

<ul
class="timeline"
id="timeline">

</ul>

</div>

</div>

<footer>

© 2026 Consignment Tracking System

</footer>

<script type="module" src="tracking.js"></script>

</body>
</html>
